<script>
function validar_cadastro() {

    let nome = ipt_nome.value;
    let email = ipt_email.value;
    let senha = ipt_senha.value;

    let caracter = ["!", "@", "#", "$", "%", "^", "&", "*"];
    let temCaracter = false;
    let temCaracter_email = false;

    let valido = true;

    erro.innerHTML = "";
    erro_senha.innerHTML = "";

    if (nome == "" || email == "" || senha == "") {
        alert('Preencha todos os campos!');
        valido = false;
    }


    for (let i = 0; i < email.length; i++) {
        if (email[i] == "@" || email[i] == ".") {
            temCaracter_email = true;
            break;
        }
    }

    if (!temCaracter_email) {
        erro.innerHTML = "Email inválido!";
        valido = false;
    } else {
        erro.innerHTML = "Email válido!";
    }


    if (senha.length < 6) {
        erro_senha.innerHTML = "A senha deve ter pelo menos 6 caracteres";
        valido = false;
    }

    
    for (let i = 0; i < senha.length; i++) {
        if (caracter.includes(senha[i])) {
            temCaracter = true;
            break;
        }
    }

    if (!temCaracter) {
        erro_senha.innerHTML = "A senha deve conter um caractere especial";
        valido = false;
    }

   
    if (valido) {
        erro_senha.innerHTML = "Senha válida";
        window.location.href = "pagina_dashboard.html";
    }
}
</script>
