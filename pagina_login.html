<script>
    function validar_cadastro() {


        let email = ipt_email.value;
        let senha = ipt_senha.value;
        let temCaracter = false;
        let caracter = ["!", "@", "#", "$", "%", "^", "&", "*"];
        let temCaracter_email = false;
        let caracter_email = ["@", "."];


        if (email == "" || senha == "") {
            alert('Por favor, preencha todos os campos!')
        }

            for (let i = 0; i < email.length; i++) {

                if (caracter_email.includes(senha[i])) {
                    temCaracter_email = true;
                    break;
                }
            }

            for (let i = 0; i < senha.length; i++) {
                    if (caracter.includes(senha[i])) {
                        temCaracter = true;
                        break;
                    }
                }

            if (!temCaracter_email) {
                erro.innerText = "Email invalido!";
            }
            if (senha.length < 6) {
                    erro_senha.innerText = "A senha deve ter pelo menos 6 caracteres";
                }
            if (!temCaracter) {
                    erro_senha.innerText = "A senha deve conter um caractere especial";
                }

                else {
                erro.innerText = "Email valido!";
                erro_senha.innerText = "Senha válida";
                }
            }


</script>
